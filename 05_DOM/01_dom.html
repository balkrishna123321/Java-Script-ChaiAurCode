document.querySelector('ul') unordered list of 3 list item store it in a constant for further uses
const myul = document.querySelector('ul')
myul.querySelector('li'): gives first list item <li>"one"​​</li>​ then store it in a const for further uses
const turnGreen = myul.querySelector('li')  turnGreen.style.color = 'green'  turnGreen.style.backgroundColor = 'yellow'  turnGreen.style.padding = '10px'

document.querySelectorAll("li") : NodeList(3) [li, li, li] :  look like an array but it is not an array  store it in a const
const tempNodeList = document.querySelectorAll("li") Nodelist is not purly an array because if you check property there is no method like map and all but there is foreach loop available
tempNodeList[0].style.color = 'green'    access using index

const myH1 = document.querySelectorAll('h1')
myH1   gives a NodeList [h1#title.heading]
myH1[0].style.color = 'red'  

//forEach loop
tempNodeList.forEach(function (l) {
    l.style.color = 'blue',
    l.style.backgroundColor = 'green'
    console.log(l)
})

2) getElementsByClassName: 
document.getElementsByClassName('list-item') it gives HTMLCollection not NodeList and there is no forEach loop in the HTMLCollection so how i access? convert into array
const classList = document.getElementsByClassName('list-item')
Array.from(classList)  this convert HTMLCollection into array
const myConvertedArray = Array.from(classList)
myConvertedArray.forEach(function (item) {  we apply the forEach loop on this array
    console.log(item)
})
